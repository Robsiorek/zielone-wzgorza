# ═══════════════════════════════════════════════════════════════
# Nginx config snippet for Zielone Wzgórza
# STATUS: REFERENCYJNA — aktualna konfiguracja produkcyjna jest
#   bezpośrednio na VPS w /etc/nginx/sites-available/.
#   Ten plik służy jako dokumentacja i punkt startowy.
# Add to your server block in /etc/nginx/sites-available/
# ═══════════════════════════════════════════════════════════════
#
# Problem: Next.js has basePath: '/admin', so all routes are /admin/*
# Solution: Nginx proxies clean public URLs to /admin/* internally
#
# Public URLs (what client sees):
#   /offer/abc123        → customer views offer
#   /booking/123         → booking confirmation (future)
#   /pay/123             → payment page (future)
#
# Admin URLs (unchanged):
#   /admin/              → admin panel
#   /admin/offers        → offers management
#   /admin/api/*         → API endpoints

server {
    listen 80;
    server_name dev.zielonewzgorza.eu;

    # ── Public engine routes (clean URLs) ──
    # Proxy /offer/* to Next.js /admin/offer/*
    location /offer/ {
        proxy_pass http://127.0.0.1:3000/admin/offer/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Future: /booking/* → /admin/booking/*
    # location /booking/ {
    #     proxy_pass http://127.0.0.1:3000/admin/booking/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Future: /pay/* → /admin/pay/*
    # location /pay/ {
    #     proxy_pass http://127.0.0.1:3000/admin/pay/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # ── Admin panel + API ──
    location /admin/ {
        proxy_pass http://127.0.0.1:3000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static assets from Next.js ──
    location /_next/ {
        proxy_pass http://127.0.0.1:3000/_next/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
